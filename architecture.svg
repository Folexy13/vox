<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e293b">Vox Architecture — Real-Time Multilingual Voice AI</text>
  
  <!-- User A Box -->
  <rect x="50" y="80" width="200" height="180" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">User A (French)</text>
  <text x="150" y="135" text-anchor="middle" font-size="24">🇫🇷</text>
  <text x="150" y="160" text-anchor="middle" font-size="12" fill="#475569">Speaks French</text>
  <text x="150" y="180" text-anchor="middle" font-size="11" fill="#64748b">Microphone + VAD</text>
  <text x="150" y="200" text-anchor="middle" font-size="11" fill="#64748b">100ms audio chunks</text>
  <text x="150" y="220" text-anchor="middle" font-size="11" fill="#64748b">React Frontend</text>
  <text x="150" y="245" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="bold">Hears English 🔊</text>
  
  <!-- User B Box -->
  <rect x="950" y="80" width="200" height="180" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="1050" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">User B (English)</text>
  <text x="1050" y="135" text-anchor="middle" font-size="24">🇬🇧</text>
  <text x="1050" y="160" text-anchor="middle" font-size="12" fill="#475569">Speaks English</text>
  <text x="1050" y="180" text-anchor="middle" font-size="11" fill="#64748b">Microphone + VAD</text>
  <text x="1050" y="200" text-anchor="middle" font-size="11" fill="#64748b">100ms audio chunks</text>
  <text x="1050" y="220" text-anchor="middle" font-size="11" fill="#64748b">React Frontend</text>
  <text x="1050" y="245" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="bold">Hears French 🔊</text>
  
  <!-- Voxa AI User Box -->
  <rect x="500" y="80" width="200" height="140" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">Agent Mode User</text>
  <text x="600" y="135" text-anchor="middle" font-size="24">🧑‍💻</text>
  <text x="600" y="160" text-anchor="middle" font-size="12" fill="#475569">Speaks Any Language</text>
  <text x="600" y="180" text-anchor="middle" font-size="11" fill="#64748b">Talks to Voxa AI</text>
  <text x="600" y="200" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="bold">Gets AI Companion 🤖</text>
  
  <!-- WebSocket Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- User A to Backend -->
  <path d="M 250 170 L 380 320" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="280" y="240" font-size="11" fill="#6366f1" transform="rotate(-35 280 240)">WebSocket</text>
  
  <!-- User B to Backend -->
  <path d="M 950 170 L 820 320" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="870" y="240" font-size="11" fill="#6366f1" transform="rotate(35 870 240)">WebSocket</text>
  
  <!-- Agent User to Backend -->
  <path d="M 600 220 L 600 310" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="620" y="270" font-size="11" fill="#6366f1">WebSocket</text>
  
  <!-- Google Cloud Run Box -->
  <rect x="300" y="300" width="600" height="400" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
  <text x="600" y="335" text-anchor="middle" font-size="18" font-weight="bold" fill="#047857">☁️ Google Cloud Run</text>
  <text x="600" y="355" text-anchor="middle" font-size="12" fill="#059669">FastAPI + Pipecat Backend</text>
  
  <!-- Pipecat Pipeline Box -->
  <rect x="340" y="370" width="520" height="80" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="400" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">🐱 Pipecat Pipeline</text>
  <text x="600" y="420" text-anchor="middle" font-size="11" fill="#15803d">Real-time Audio Processing | Silero VAD | Interruption Handling</text>
  <text x="600" y="438" text-anchor="middle" font-size="11" fill="#15803d">RNNoise Filter | Native Streaming</text>
  
  <!-- Gemini Live Box -->
  <rect x="380" y="470" width="440" height="100" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="600" y="500" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">🔮 Gemini 2.5 Flash Native Audio</text>
  <text x="600" y="525" text-anchor="middle" font-size="12" fill="#b91c1c">Real-time Voice Understanding | Translation | AI Conversation</text>
  <text x="600" y="545" text-anchor="middle" font-size="11" fill="#991b1b">Emotion Preservation | Cultural Context | Multilingual Support</text>
  
  <!-- Processing Boxes -->
  <rect x="340" y="590" width="150" height="60" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="415" y="615" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">🗣️ Transcription</text>
  <text x="415" y="635" text-anchor="middle" font-size="10" fill="#9333ea">Speech-to-Text</text>
  
  <rect x="525" y="590" width="150" height="60" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="600" y="615" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">🌍 Translation</text>
  <text x="600" y="635" text-anchor="middle" font-size="10" fill="#9333ea">Gemini LLM</text>
  
  <rect x="710" y="590" width="150" height="60" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="785" y="615" text-anchor="middle" font-size="12" font-weight="bold" fill="#7e22ce">🔊 Voice Synthesis</text>
  <text x="785" y="635" text-anchor="middle" font-size="10" fill="#9333ea">Native Audio Output</text>
  
  <!-- Redis Box -->
  <rect x="50" y="400" width="180" height="80" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">🗄️ Redis</text>
  <text x="140" y="450" text-anchor="middle" font-size="11" fill="#dc2626">Session State</text>
  <text x="140" y="468" text-anchor="middle" font-size="11" fill="#dc2626">Room Management</text>
  
  <!-- Arrow from Backend to Redis -->
  <path d="M 300 440 L 230 440" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Features List -->
  <rect x="50" y="520" width="220" height="180" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="160" y="545" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">✨ Key Features</text>
  <text x="65" y="570" font-size="11" fill="#475569">✅ Real-time translation</text>
  <text x="65" y="590" font-size="11" fill="#475569">✅ Interruption handling</text>
  <text x="65" y="610" font-size="11" fill="#475569">✅ Emotion preservation</text>
  <text x="65" y="630" font-size="11" fill="#475569">✅ Voice cloning ready</text>
  <text x="65" y="650" font-size="11" fill="#475569">✅ Live transcripts</text>
  <text x="65" y="670" font-size="11" fill="#475569">✅ Voxa AI companion</text>
  <text x="65" y="690" font-size="11" fill="#475569">✅ Nigerian languages</text>
  
  <!-- Languages List -->
  <rect x="930" y="400" width="220" height="180" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="1040" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">🌍 Supported Languages</text>
  <text x="945" y="450" font-size="11" fill="#475569">🇺🇸 English (US/UK/NG)</text>
  <text x="945" y="470" font-size="11" fill="#475569">🇫🇷 French</text>
  <text x="945" y="490" font-size="11" fill="#475569">🇪🇸 Spanish</text>
  <text x="945" y="510" font-size="11" fill="#475569">🇩🇪 German</text>
  <text x="945" y="530" font-size="11" fill="#475569">🇧🇷 Portuguese</text>
  <text x="945" y="550" font-size="11" fill="#16a34a" font-weight="bold">🇳🇬 Yoruba (Differentiator)</text>
  <text x="945" y="570" font-size="11" fill="#16a34a" font-weight="bold">🇳🇬 Igbo (Differentiator)</text>
  <text x="945" y="590" font-size="11" fill="#16a34a" font-weight="bold">🇳🇬 Hausa (Differentiator)</text>
  
  <!-- Data Flow Arrows inside Cloud Run -->
  <path d="M 415 450 L 415 470" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 600 450 L 600 470" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 785 450 L 785 470" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <path d="M 415 570 L 415 590" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 600 570 L 600 590" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 785 570 L 785 590" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Return arrows to users -->
  <path d="M 380 680 L 200 750" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="260" y="730" font-size="11" fill="#16a34a" transform="rotate(-25 260 730)">Translated Audio</text>
  
  <path d="M 820 680 L 1000 750" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="920" y="730" font-size="11" fill="#16a34a" transform="rotate(25 920 730)">Translated Audio</text>
  
  <!-- User A receives -->
  <rect x="50" y="740" width="200" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="150" y="765" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">User A Receives</text>
  <text x="150" y="785" text-anchor="middle" font-size="11" fill="#15803d">English in User B's voice</text>
  
  <!-- User B receives -->
  <rect x="950" y="740" width="200" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="1050" y="765" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">User B Receives</text>
  <text x="1050" y="785" text-anchor="middle" font-size="11" fill="#15803d">French in User A's voice</text>
  
  <!-- Footer -->
  <text x="600" y="850" text-anchor="middle" font-size="14" fill="#64748b">Built for Gemini Live Agent Challenge 2026 | #GeminiLiveAgentChallenge</text>
  <text x="600" y="875" text-anchor="middle" font-size="12" fill="#94a3b8">Your voice. Any language. Real time.</text>
</svg>