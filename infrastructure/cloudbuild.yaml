# Cloud Build configuration for Vox
# Gemini Live Agent Challenge 2026
#
# This file enables automated CI/CD deployment to Cloud Run
# Triggered on push to main branch

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vox-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vox-backend:latest'
      - './backend'
    id: 'build-backend'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/vox-backend:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/vox-backend:latest'
    id: 'push-latest'
    waitFor: ['build-backend']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'vox-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vox-backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GCS_BUCKET_NAME=${_GCS_BUCKET}'
    id: 'deploy-backend'
    waitFor: ['push-backend']

# Substitution variables (can be overridden)
substitutions:
  _REGION: 'us-central1'
  _GCS_BUCKET: '${PROJECT_ID}-vox-profiles'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/vox-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/vox-backend:latest'

# Build timeout (20 minutes)
timeout: '1200s'

# Tags for organization
tags:
  - 'vox'
  - 'gemini-hackathon'
  - 'live-agent'
