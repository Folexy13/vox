# Cloud Run Service Definition for Vox
# Gemini Live Agent Challenge 2026
#
# This YAML can be used with:
# gcloud run services replace infrastructure/cloudrun.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: vox-backend
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "Vox - Real-Time Multilingual Voice Agent"
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Scaling configuration
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        # Execution environment
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: default
      containers:
        - image: gcr.io/PROJECT_ID/vox-backend:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "${GOOGLE_CLOUD_PROJECT}"
            - name: GCS_BUCKET_NAME
              value: "${GCS_BUCKET_NAME}"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ${GOOGLE_API_KEY_SECRET_NAME}
                  key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
